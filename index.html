<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SunChill — Trouve le soleil</title>
<meta name="description" content="Trouvez en un coup d'œil les rues et terrasses au soleil, à toute heure de la journée.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#232B3C">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SunChill">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --ink:#1E2433; --panel:#232B3C; --panel-2:#2C3549;
    --sun:#FFC833; --sun-deep:#F5A623; --cream:#F3ECDC; --muted:#8E99B3;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Avenir Next","Trebuchet MS",system-ui,sans-serif;
    background:var(--ink); color:var(--cream);
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }
  header{
    display:flex; align-items:center; gap:.55rem;
    padding:.5rem .75rem; background:var(--panel);
    border-bottom:1px solid #39435C; z-index:1200; position:relative;
  }
  .logo{display:flex;align-items:center;gap:.4rem;font-weight:700;letter-spacing:.05em;font-size:1rem;}
  .disc{
    width:20px;height:20px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #FFE9A0, var(--sun) 60%, var(--sun-deep));
    box-shadow:0 0 10px rgba(255,200,51,.7);
  }
  .logo b{color:var(--sun);}
  header .spacer{flex:1;}
  #dateInput{
    background:var(--panel-2); color:var(--cream);
    border:1px solid #46536F; border-radius:8px;
    padding:.35rem .4rem; font:inherit; font-size:.8rem;
    color-scheme:dark; max-width:130px;
  }
  /* ── Carte ── */
  #mapwrap{position:relative; flex:1; min-height:0;}
  #map{position:absolute; inset:0; background:#DDD;}
  #sunCanvas{
    position:absolute; inset:0; z-index:550; pointer-events:none;
    mix-blend-mode:multiply;
  }
  .leaflet-control-attribution{font-size:9px !important;}
  /* ── Loupe & recherche ── */
  #searchBtn{
    position:absolute; top:.55rem; left:.6rem; z-index:900;
    width:44px; height:44px; border-radius:50%; cursor:pointer;
    background:transparent; border:none;
    font-size:1.5rem;
    filter:drop-shadow(0 1px 3px rgba(0,0,0,.55));
  }
  #locateBtn{
    position:absolute; top:3.4rem; left:.6rem; z-index:900;
    width:40px; height:40px; border-radius:50%; cursor:pointer;
    background:rgba(30,36,51,.85); border:1px solid #46536F;
    color:var(--cream); font-size:1rem;
  }
  #locateBtn.busy{ opacity:.6; }
  #searchBox{
    position:absolute; top:.6rem; left:.6rem; right:.6rem; z-index:950;
    display:none; background:var(--panel); border:1px solid #46536F;
    border-radius:14px; padding:.55rem; box-shadow:0 8px 24px rgba(0,0,0,.45);
  }
  #searchBox .row{display:flex; gap:.4rem;}
  #searchInput{
    flex:1; background:var(--panel-2); color:var(--cream);
    border:1px solid #46536F; border-radius:999px;
    padding:.5rem .9rem; font:inherit; font-size:.9rem; min-width:0;
  }
  #searchInput::placeholder{color:#6B7692;}
  #searchClose{
    width:38px; height:38px; border-radius:50%; border:1px solid #46536F;
    background:var(--panel-2); color:var(--cream); cursor:pointer; font-size:1rem; flex:0 0 auto;
  }
  #searchResults{margin-top:.4rem; max-height:38vh; overflow-y:auto;}
  #searchResults .res{
    padding:.55rem .6rem; font-size:.82rem; cursor:pointer;
    border-top:1px solid #39435C; line-height:1.35;
  }
  #searchResults .res:hover{background:#38445E;}
  #searchResults .res small{color:var(--muted); display:block;}
  /* ── Infos / bandeau ── */
  #banner{
    position:absolute; bottom:.6rem; left:50%; transform:translateX(-50%);
    z-index:900; background:rgba(30,36,51,.9); border:1px solid #46536F;
    border-radius:12px; padding:.35rem .8rem; font-size:.7rem;
    max-width:94%; text-align:center; line-height:1.4; pointer-events:none;
  }
  #banner.warn{border-color:var(--sun); color:#FFE1A0;}
  #suninfo{
    position:absolute; top:.6rem; right:.6rem; z-index:900;
    background:rgba(30,36,51,.9); border:1px solid #46536F; border-radius:10px;
    padding:.35rem .55rem; font-size:.68rem; line-height:1.5; color:var(--muted);
    text-align:right; pointer-events:none;
  }
  #suninfo b{color:var(--cream);}
  /* ── Contrôles temps ── */
  #controls{
    background:var(--panel); border-top:1px solid #39435C;
    padding:1.8rem .75rem calc(.45rem + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; gap:.3rem; z-index:1200; position:relative;
  }
  .timerow{display:flex; align-items:center; gap:.65rem;}
  #playBtn{
    width:34px; height:34px; border-radius:50%; flex:0 0 auto;
    background:transparent; border:1.5px solid #46536F;
    color:var(--sun); font-size:.85rem; cursor:pointer;
  }
  #playBtn:active{transform:scale(.93);}
  .sliderwrap{flex:1; position:relative;}
  #timeBubble{
    position:absolute; top:-1.75rem; transform:translateX(-50%);
    background:var(--panel-2); border:1px solid var(--sun); color:var(--sun);
    font-weight:600; font-variant-numeric:tabular-nums; font-size:.88rem;
    padding:.08rem .45rem; border-radius:7px; white-space:nowrap;
    pointer-events:none;
  }
  #timeBubble::after{
    content:""; position:absolute; left:50%; bottom:-6px; transform:translateX(-50%);
    border:6px solid transparent; border-top-color:var(--sun); border-bottom:none;
  }
  input[type="range"]{
    -webkit-appearance:none; appearance:none; width:100%; height:7px; border-radius:999px;
    background:linear-gradient(90deg,
      #1B2340 0%, #37456F 8%, #C4744F 15%, #FFC46B 25%,
      #BFE3FF 42%, #A9DBFF 58%,
      #FFC46B 76%, #C4744F 85%, #37456F 93%, #1B2340 100%);
    outline:none; cursor:pointer; border:1px solid #46536F;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none;
    width:22px; height:22px; border-radius:50%;
    background:var(--sun);
    border:1.5px solid #FFF; box-shadow:0 1px 4px rgba(0,0,0,.35); cursor:grab;
  }
  input[type="range"]::-moz-range-thumb{
    width:20px; height:20px; border-radius:50%;
    background:var(--sun);
    border:1.5px solid #FFF; box-shadow:0 1px 4px rgba(0,0,0,.35); cursor:grab;
  }
  #placesBtn{
    position:absolute; bottom:.65rem; left:.6rem; z-index:900;
    width:40px; height:40px; border-radius:50%; cursor:pointer;
    border:1px solid #46536F; background:rgba(30,36,51,.85);
    font-size:.95rem; opacity:.5;
    transition:opacity .15s, border-color .15s;
  }
  #placesBtn.active{ opacity:1; border-color:#FFC833; }
  #verBadge{
    top:3.1rem; right:.6rem; z-index:900;
    background:rgba(30,36,51,.75); border:1px solid #39435C; border-radius:7px;
    padding:.1rem .4rem; font-size:.62rem; color:#8E99B3; position:absolute;
  }
  #compass{
    position:absolute; top:.6rem; right:.7rem; z-index:900;
    pointer-events:none;
    filter:drop-shadow(0 1px 3px rgba(0,0,0,.45));
  }
  .place-popup b{ display:block; margin-bottom:.4rem; font-size:.95rem; color:#1E2433; }
  .rate-row{ display:flex; gap:.18rem; margin:.1rem 0 .25rem; }
  .rate-sun{
    font-size:1.15rem; line-height:1; cursor:pointer; user-select:none;
    color:#C9C2B2; transition:color .12s, transform .12s;
  }
  .rate-sun:hover{ transform:scale(1.15); }
  .rate-sun.on{ color:#F5A623; text-shadow:0 0 5px rgba(245,166,35,.45); }
  .rate-hint{ font-size:.65rem; color:#7A7365; font-weight:400; }
  .place-badge{
    position:absolute; top:-4px; right:-4px;
    min-width:14px; height:14px; border-radius:50%;
    background:#FFC833; color:#3A2A00;
    font-size:9px; font-weight:700; line-height:14px; text-align:center;
    border:1px solid #232B3C;
  }
  .place-pin.rated{ border-color:#FFC833; }
  #placeCard{
    position:absolute; left:.6rem; right:.6rem; bottom:.65rem; z-index:1300;
    background:#FFFFFF; color:#111111;
    border:1px solid #A99F8C; border-radius:12px;
    padding:.75rem 2.2rem .7rem .95rem;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
    display:none;
  }
  #placeCard .card-close{
    position:absolute; top:.4rem; right:.45rem;
    width:26px; height:26px; border-radius:50%; border:none; cursor:pointer;
    background:#EFEBE2; color:#555; font-size:.8rem; line-height:1;
  }
  #placeCard b{ display:block; font-size:1rem; color:#111111; margin-bottom:.3rem; }
  #placeCard .rate-hint{ color:#555046; }
  .metro-pin{
    width:18px; height:18px; border-radius:50%;
    background:#00814F; color:#FFFFFF;
    border:1.5px solid #FFFFFF;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; line-height:1;
    box-shadow:0 1px 4px rgba(0,0,0,.35);
    opacity:.9;
  }
  .place-pin{
    position:relative; width:26px; height:26px; border-radius:50%;
    background:#232B3C; border:1.5px solid #F3ECDC;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; box-shadow:0 2px 6px rgba(0,0,0,.35);
  }
  #loader{
    display:none; margin-left:.55rem;
  }
  #loader .ring{
    width:16px; height:16px; border-radius:50%;
    border:2.5px solid rgba(70,83,111,.5); border-top-color:#FFC833;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  /* ── Pin de recherche ── */
  .sun-pin-wrap{ position:relative; width:30px; height:30px; }
  .sun-pin-ring{
    position:absolute; left:50%; bottom:1px; width:14px; height:14px;
    margin-left:-7px; border-radius:50%;
    background:rgba(255,200,51,.55);
    animation:sunPulse 1.6s ease-out infinite;
  }
  @keyframes sunPulse{
    0%{ transform:scale(1); opacity:.8; }
    100%{ transform:scale(3.4); opacity:0; }
  }
  .sun-pin{
    position:absolute; inset:0;
    border-radius:50% 50% 50% 0;
    transform:rotate(-45deg); transform-origin:center;
    background:radial-gradient(circle at 35% 35%, #FFE9A0, #FFC833 60%, #F5A623);
    border:2.5px solid #FFF; box-shadow:0 3px 10px rgba(0,0,0,.45);
    display:flex; align-items:center; justify-content:center;
  }
  .sun-pin::after{
    content:"☀"; transform:rotate(45deg); font-size:14px; color:#4A3300;
  }
  .leaflet-popup,
  .leaflet-fade-anim .leaflet-popup,
  .leaflet-fade-anim .leaflet-map-pane .leaflet-popup{
    opacity:1 !important; transition:none !important;
  }
  .leaflet-popup-content{font-family:inherit; font-weight:600; margin:.55rem .85rem; color:#232B3C;}
  .leaflet-popup-content-wrapper{
    background:#FFFFFF !important; background-color:#FFFFFF !important;
    color:#232B3C !important; opacity:1 !important;
    border:1px solid #B9B1A0; border-radius:10px;
    box-shadow:0 8px 22px rgba(0,0,0,.35);
  }
  .leaflet-popup-tip{ background:#FFFFFF !important; background-color:#FFFFFF !important;
    opacity:1 !important; box-shadow:none; }
  .leaflet-popup-close-button{ color:#8A8375 !important; }
  /* ── Pop-up pub ── */
  #adOverlay{
    position:fixed; inset:0; z-index:3000; display:none;
    background:rgba(12,16,28,.55); backdrop-filter:blur(2px);
    align-items:center; justify-content:center; padding:1.2rem;
  }
  #adBox{
    width:min(340px, 92vw); background:#FFF; color:#222; border-radius:16px;
    overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.5); position:relative;
    font-family:system-ui, sans-serif;
  }
  #adClose{
    position:absolute; top:.5rem; right:.5rem;
    width:30px; height:30px; border-radius:50%; border:none;
    background:rgba(0,0,0,.55); color:#FFF; font-size:.85rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  #adClose:disabled{opacity:.75; cursor:default; font-size:.7rem;}
  #adBox .visual{
    height:150px;
    background:linear-gradient(135deg, #FFC833, #FF8A5C 60%, #FF5C8A);
    display:flex; align-items:center; justify-content:center;
    font-size:2.6rem;
  }
  #adBox .body{padding:.9rem 1rem 1.1rem;}
  #adBox .body h3{font-size:1rem; margin-bottom:.3rem;}
  #adBox .body p{font-size:.8rem; color:#666; line-height:1.45;}
  #adBox .tag{
    display:inline-block; margin-top:.6rem; font-size:.62rem; letter-spacing:.08em;
    color:#999; border:1px solid #DDD; border-radius:4px; padding:.12rem .4rem;
  }
</style>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
"use strict";
/* ═══════════ SunChill v3 — Leaflet + surcouche solaire ═══════════ */

const rad = Math.PI/180, deg = 180/Math.PI;
const dayMs = 86400000, J1970 = 2440588, J2000 = 2451545, E = rad*23.4397;

/* ── Position du soleil (algorithme astronomique) ── */
function toDays(date){ return date.valueOf()/dayMs - 0.5 + J1970 - J2000; }
function sunPosition(date, lat, lng){
  const lw = rad*-lng, phi = rad*lat, d = toDays(date);
  const M = rad*(357.5291 + 0.98560028*d);
  const C = rad*(1.9148*Math.sin(M) + 0.02*Math.sin(2*M) + 0.0003*Math.sin(3*M));
  const L = M + C + rad*102.9372 + Math.PI;
  const dec = Math.asin(Math.sin(E)*Math.sin(L));
  const ra  = Math.atan2(Math.sin(L)*Math.cos(E), Math.cos(L));
  const H   = rad*(280.16 + 360.9856235*d) - lw - ra;
  return {
    altitude: Math.asin(Math.sin(phi)*Math.sin(dec) + Math.cos(phi)*Math.cos(dec)*Math.cos(H)),
    azimuth : Math.atan2(Math.sin(H), Math.cos(H)*Math.sin(phi) - Math.tan(dec)*Math.cos(phi))
  };
}
function lastSunday(y,m){ const l=new Date(Date.UTC(y,m,0)); return l.getUTCDate()-l.getUTCDay(); }
function isParisDST(y,m,d){
  if(m>3&&m<10) return true;
  if(m<3||m>10) return false;
  return m===3 ? d>=lastSunday(y,3) : d<lastSunday(y,10);
}
function localDate(str, minutes){
  const [y,m,d] = str.split("-").map(Number);
  return new Date(Date.UTC(y, m-1, d, 0, minutes - (isParisDST(y,m,d)?2:1)*60));
}

/* ── État ── */
const state = {
  dateStr:"", minutes:840,
  buildings:[],          // {latlngs:[[lat,lon]...], h}
  loadedBounds:null, loading:false, netFailed:false,
  playing:false, marker:null, // marqueur du dernier lieu recherché
  placesLayer:null, placesVisible:true, metroLayer:null, heightSource:null,
  water:[], waterLines:[], parks:[],
  ratings:{}, lastPlaces:[]
};

/* ── Carte Leaflet ── */
const map = L.map("map", {zoomControl:true, attributionControl:true, zoomSnap:0.25, zoomDelta:0.5})
  .setView([48.8906, 2.3199], 18.5); // Métro Brochant, Paris 17ᵉ — ≈ 50 m de rayon à l'ouverture
map.zoomControl.setPosition("bottomright");
map.on("click", ()=>{ if(window.closeCard) closeCard(); });

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains:"abcd", maxZoom:20
}).addTo(map);

/* ── Canvas de surcouche solaire ── */
const canvas = document.getElementById("sunCanvas");
const ctx = canvas.getContext("2d");
let W=0, H=0, DPR=1;
function resizeCanvas(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  const r = document.getElementById("mapwrap").getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+"px"; canvas.style.height = H+"px";
  render();
}
window.addEventListener("resize", resizeCanvas);

/* ── Chargement des bâtiments (OpenStreetMap / Overpass) ── */
const OVERPASS = [
  "https://maps.mail.ru/osm/tools/overpass/api/interpreter",
  "https://overpass.kumi.systems/api/interpreter",
  "https://overpass-api.de/api/interpreter",
  "https://overpass.private.coffee/api/interpreter"
];
async function fetchOverpass(query){
  let err;
  for(let i=0;i<OVERPASS.length;i++){
    /* progression indiquée par la roue de chargement */
    try{
      const ctrl = new AbortController();
      const to = setTimeout(()=>ctrl.abort(), 30000);
      const r = await fetch(OVERPASS[i], {
        method:"POST", body:"data="+encodeURIComponent(query),
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        signal:ctrl.signal
      });
      clearTimeout(to);
      if(!r.ok) throw new Error("HTTP "+r.status);
      return await r.json();
    }catch(e){ err = e; }
  }
  throw err;
}
/* ── Hauteurs de bâtiments : BD TOPO (IGN) en priorité ──
   La BD TOPO couvre tout le territoire français avec des hauteurs mesurées.
   Hors de France (ou si le service ne répond pas), on retombe sur
   les étiquettes OpenStreetMap, puis sur une estimation par défaut. */
const IGN_WFS = "https://data.geopf.fr/wfs/ows";
async function fetchIGNBuildings(south, west, north, east){
  /* La BBOX du WFS Géoplateforme attend l'ordre longitude,latitude
     (ouest,sud,est,nord) — vérifié en conditions réelles. */
  const url = IGN_WFS + "?SERVICE=WFS&VERSION=2.0.0&REQUEST=GetFeature"
    + "&TYPENAME=BDTOPO_V3:batiment&SRSNAME=EPSG:4326"
    + "&BBOX=" + [west,south,east,north].join(",") + ",EPSG:4326"
    + "&STARTINDEX=0&COUNT=3000&outputFormat=application/json";
  const ctrl = new AbortController();
  const to = setTimeout(()=>ctrl.abort(), 15000);
  try{
    const r = await fetch(url, {signal:ctrl.signal});
    clearTimeout(to);
    if(!r.ok) throw new Error("HTTP "+r.status);
    const geo = await r.json();
    if(!geo.features || !geo.features.length) throw new Error("aucun bâtiment");
    const out = [];
    for(const f of geo.features){
      const g = f.geometry, p = f.properties || {};
      if(!g) continue;
      // hauteur mesurée ; à défaut, nombre d'étages ; à défaut, valeur type
      let h = parseFloat(p.hauteur);
      if(!(h > 0)){
        const et = parseFloat(p.nombre_d_etages);
        h = (et > 0) ? et*3 + 2 : 16;
      }
      h = Math.min(h, 300);
      // Polygon ou MultiPolygon : on garde le contour extérieur de chaque partie
      const rings = (g.type === "Polygon") ? [g.coordinates[0]]
                  : (g.type === "MultiPolygon") ? g.coordinates.map(c=>c[0])
                  : [];
      for(const ring of rings){
        if(ring && ring.length > 3){
          // GeoJSON = [lon, lat] (parfois suivi de l'altitude, ignorée)
          out.push({latlngs: ring.map(c=>[c[1], c[0]]), h});
        }
      }
    }
    if(out.length < 3) throw new Error("trop peu de bâtiments");
    return out;
  }catch(e){
    clearTimeout(to);
    throw e;
  }
}

function parseHeight(t){
  if(!t) return 16;
  if(t.height){ const h=parseFloat(String(t.height).replace(",",".")); if(h>0) return Math.min(h,120); }
  if(t["building:levels"]){ const n=parseFloat(t["building:levels"]); if(n>0) return Math.min(n*3+2,120); }
  return 16;
}
/* Largeur réellement visible à l'écran, en mètres (indépendant de la taille d'appareil) */
function visibleWidthMeters(){
  const b = map.getBounds();
  const lat = map.getCenter().lat;
  return (b.getEast()-b.getWest()) * 111320 * Math.cos(lat*Math.PI/180);
}
const MAX_WIDTH_M = 200; // au-delà : bâtiments et ombres masqués (allègement)

/* ── Carnet de favoris : notes 1-5 soleils, stockées sur l'appareil ──
   Clé = coordonnées arrondies + nom, pour retrouver un lieu d'une session à l'autre. */
const RATINGS_KEY = "sunchill.ratings.v1";
function loadRatings(){
  try{ return JSON.parse(localStorage.getItem(RATINGS_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveRatings(r){
  try{ localStorage.setItem(RATINGS_KEY, JSON.stringify(r)); }
  catch(e){ /* stockage plein ou refusé : on continue sans planter */ }
}
function placeKey(lat, lon, name){
  return lat.toFixed(5)+","+lon.toFixed(5)+"|"+(name||"");
}
function getRating(lat, lon, name){
  return state.ratings[placeKey(lat,lon,name)] || 0;
}
function setRating(lat, lon, name, stars){
  const k = placeKey(lat,lon,name);
  if(stars === 0) delete state.ratings[k];
  else state.ratings[k] = stars;
  saveRatings(state.ratings);
}
/* Contenu du popup : nom + 5 soleils cliquables */
function ratingPopupHtml(lat, lon, name){
  const cur = getRating(lat, lon, name);
  let suns = '<div class="rate-row" data-lat="'+lat+'" data-lon="'+lon+'" data-name="'+
             String(name).replace(/"/g,"&quot;")+'">';
  for(let i=1;i<=5;i++){
    suns += '<span class="rate-sun'+(i<=cur?" on":"")+'" data-star="'+i+'">☀</span>';
  }
  suns += '</div>';
  const hint = cur ? '<div class="rate-hint">Votre note : '+cur+'/5 · retoucher la même pour effacer</div>'
                   : '<div class="rate-hint">Notez ce spot</div>';
  return '<div class="place-popup"><b>'+name+'</b>'+suns+hint+'</div>';
}
/* Un seul écouteur global : capte les clics sur les soleils de n'importe quel popup */
document.addEventListener("click", e=>{
  const sun = e.target.closest(".rate-sun");
  if(!sun) return;
  const row = sun.closest(".rate-row");
  const lat = parseFloat(row.dataset.lat), lon = parseFloat(row.dataset.lon);
  const name = row.dataset.name;
  const star = parseInt(sun.dataset.star, 10);
  // recliquer la note actuelle l'efface
  const next = (getRating(lat,lon,name) === star) ? 0 : star;
  setRating(lat, lon, name, next);
  // mise à jour immédiate du popup ouvert
  row.querySelectorAll(".rate-sun").forEach(el=>{
    el.classList.toggle("on", parseInt(el.dataset.star,10) <= next);
  });
  const hint = row.parentElement.querySelector(".rate-hint");
  if(hint) hint.textContent = next ? "Votre note : "+next+"/5 · retoucher la même pour effacer"
                                   : "Notez ce spot";
  if(state.placesLayer) refreshPlaces(state.lastPlaces || []);
});

/* Panneau d'information : remplace la bulle Leaflet (opacité totale garantie) */
function openCard(lat, lon, name, withRating){
  const el = document.getElementById("placeCard");
  el.innerHTML = '<button class="card-close" onclick="closeCard()">✕</button>' +
    (withRating ? ratingPopupHtml(lat, lon, name)
                : '<b>'+name+'</b>');
  el.style.display = "block";
}
window.closeCard = function(){
  document.getElementById("placeCard").style.display = "none";
};

/* Stations de métro : petit « M » discret pour se repérer.
   (À Paris la couleur appartient à la ligne, pas à la station : on garde
    le vert-bleu RATP classique, uniforme et sobre.) */
function refreshMetro(list){
  if(state.metroLayer) map.removeLayer(state.metroLayer);
  const group = L.layerGroup();
  const seen = new Set();
  for(const m of list){
    // une seule pastille par station : on ignore les bouches multiples proches
    const k = m.name + "|" + m.lat.toFixed(3) + "," + m.lon.toFixed(3);
    if(seen.has(k)) continue;
    seen.add(k);
    const icon = L.divIcon({
      className:"", html:'<div class="metro-pin">M</div>',
      iconSize:[18,18], iconAnchor:[9,9]
    });
    L.marker([m.lat, m.lon], {icon, interactive:true})
      .on("click", ()=>openCard(m.lat, m.lon, m.name + " · Métro", false))
      .addTo(group);
  }
  state.metroLayer = group;
  group.addTo(map);
}

function refreshPlaces(list){
  if(state.placesLayer) map.removeLayer(state.placesLayer);
  state.lastPlaces = list;
  const group = L.layerGroup();
  for(const p of list){
    const stars = getRating(p.lat, p.lon, p.name);
    const badge = stars ? '<span class="place-badge">'+stars+'</span>' : '';
    const icon = L.divIcon({
      className:"",
      html:'<div class="place-pin'+(stars?" rated":"")+'">'+p.icon+badge+'</div>',
      iconSize:[26,26], iconAnchor:[13,13]
    });
    L.marker([p.lat, p.lon], {icon})
      .on("click", ()=>openCard(p.lat, p.lon, p.name, true))
      .addTo(group);
  }
  state.placesLayer = group;
  if(state.placesVisible) group.addTo(map);
}
let loadTimer = null;
function scheduleLoad(){
  clearTimeout(loadTimer);
  loadTimer = setTimeout(loadBuildings, 500);
}
async function loadBuildings(){
  if(visibleWidthMeters() > MAX_WIDTH_M){
    setBanner("Zoomez pour afficher l'ensoleillement (vue < 200 m).", false);
    state.buildings = []; state.loadedBounds = null; render();
    return;
  }
  const view = map.getBounds();
  /* marge fixe de ~120 m : les bâtiments voisins hors écran projettent
     leurs ombres dans la vue (soleil bas → ombres de 60-100 m) */
  const cLat0 = (view.getSouth()+view.getNorth())/2;
  const MARGIN = 120; // mètres
  const gLat = MARGIN/110574, gLon = MARGIN/(111320*Math.cos(cLat0*Math.PI/180));
  const b = L.latLngBounds(
    [view.getSouth()-gLat, view.getWest()-gLon],
    [view.getNorth()+gLat, view.getEast()+gLon]);
  if(state.loadedBounds && state.loadedBounds.contains(b)) return;
  if(state.loading) return;
  state.loading = true;
  showLoader(true);
  /* limiter la zone (~1,2 km max) pour rester rapide */
  const cLat = (b.getSouth()+b.getNorth())/2, cLon = (b.getWest()+b.getEast())/2;
  const hLat = Math.min((b.getNorth()-b.getSouth())/2, 0.0052);
  const hLon = Math.min((b.getEast()-b.getWest())/2, 0.0078);
  const bbox = [cLat-hLat, cLon-hLon, cLat+hLat, cLon+hLon].map(v=>v.toFixed(5)).join(",");
  const [S,Wst,N,Est] = [cLat-hLat, cLon-hLon, cLat+hLat, cLon+hLon];
  try{
    /* deux sources en parallèle :
       - IGN BD TOPO  → bâtiments avec hauteurs mesurées (France)
       - OpenStreetMap → commerces et stations de métro (partout) */
    const ignPromise = fetchIGNBuildings(S, Wst, N, Est).catch(()=>null);
    const osmPromise = fetchOverpass(`[out:json][timeout:25];(way["building"](${bbox});way["natural"="water"](${bbox});way["leisure"~"^(park|garden|playground)$"](${bbox});way["landuse"~"^(grass|recreation_ground|village_green)$"](${bbox});way["waterway"~"^(river|stream|canal)$"](${bbox});node["amenity"~"^(cafe|bar|restaurant|pub|fast_food|ice_cream|biergarten)$"](${bbox});node["railway"="station"]["station"="subway"](${bbox});node["railway"="subway_entrance"](${bbox}););out geom;out;`);
    const [ignBuildings, data] = await Promise.all([ignPromise, osmPromise]);

    const bl = [], pl = [], mt = [], wp = [], wlines = [], pk = [];
    const ICONS = {cafe:"☕",bar:"🍸",restaurant:"🍽️",pub:"🍺",fast_food:"🍔",ice_cream:"🍦",biergarten:"🍻"};
    for(const el of data.elements){
      if(el.type==="way" && el.geometry){
        const t = el.tags || {};
        if((t.leisure === "park" || t.leisure === "garden" || t.leisure === "playground"
            || t.landuse === "grass" || t.landuse === "recreation_ground"
            || t.landuse === "village_green") && el.geometry.length>3){
          pk.push(el.geometry.map(g=>[g.lat,g.lon]));
        } else if(t.natural === "water" && el.geometry.length>3){
          wp.push(el.geometry.map(g=>[g.lat,g.lon]));
        } else if(t.waterway && el.geometry.length>1){
          wlines.push(el.geometry.map(g=>[g.lat,g.lon]));
        } else if(t.building && el.geometry.length>3){
          bl.push({latlngs: el.geometry.map(g=>[g.lat,g.lon]), h: parseHeight(t)});
        }
      } else if(el.type==="node" && el.tags){
        const t = el.tags;
        if(t.railway === "station" || t.railway === "subway_entrance"){
          mt.push({lat:el.lat, lon:el.lon, name:t.name||"Métro",
                   entrance: t.railway === "subway_entrance"});
        } else if(t.amenity && t.name){
          pl.push({lat:el.lat, lon:el.lon, name:t.name, icon: ICONS[t.amenity]||"📍"});
        }
      }
    }
    state.water = wp; state.waterLines = wlines; state.parks = pk;
    /* hauteurs mesurées si disponibles, sinon estimations OpenStreetMap */
    state.buildings = (ignBuildings && ignBuildings.length >= 3) ? ignBuildings : bl;
    state.heightSource = (ignBuildings && ignBuildings.length >= 3) ? "IGN" : "OSM";
    refreshPlaces(pl);
    refreshMetro(mt);
    state.loadedBounds = b;
    state.netFailed = false;
    setBanner("", false); /* succès : rien à afficher */
  }catch(e){
    state.netFailed = true;
    const proto = location.protocol;
    let msg;
    if(proto === "content:" || (e && /Failed to fetch|NetworkError|Load failed/i.test(e.message||""))){
      msg = "⚠️ Le navigateur bloque les requêtes réseau depuis ce mode d'ouverture ("+proto+"//). "+
            "Ouvrez le fichier depuis l'appli <b>Fichiers</b> (dossier Téléchargements) avec Chrome ou Firefox, "+
            "ou testez sur un ordinateur.";
    } else {
      msg = "⚠️ Serveurs OpenStreetMap saturés ("+(e && e.message ? e.message : "délai dépassé")+").";
    }
    const b = document.getElementById("banner");
    b.innerHTML = msg + ' <u style="cursor:pointer" onclick="retryLoad()">↻ Réessayer</u>';
    b.className = "warn";
    b.style.pointerEvents = "auto";
  }
  state.loading = false;
  showLoader(false);
  render();
}
function showLoader(on){
  document.getElementById("loader").style.display = on ? "block" : "none";
}
map.on("moveend zoomend", ()=>{ scheduleLoad(); render(); });
map.on("move zoom", render);

/* enroulement normalisé : tous les polygones tournent dans le même sens,
   la règle nonzero fait alors une vraie union au lieu d'annulations */
function addQuad(c, p0, p1, p2, p3){
  const A = (p1.x-p0.x)*(p1.y+p0.y) + (p2.x-p1.x)*(p2.y+p1.y)
          + (p3.x-p2.x)*(p3.y+p2.y) + (p0.x-p3.x)*(p0.y+p3.y);
  if(A >= 0){
    c.moveTo(p0.x,p0.y); c.lineTo(p1.x,p1.y); c.lineTo(p2.x,p2.y); c.lineTo(p3.x,p3.y);
  } else {
    c.moveTo(p3.x,p3.y); c.lineTo(p2.x,p2.y); c.lineTo(p1.x,p1.y); c.lineTo(p0.x,p0.y);
  }
  c.closePath();
}
function addPoly(c, pts){
  let A = 0;
  for(let i=0;i<pts.length;i++){
    const j=(i+1)%pts.length;
    A += (pts[j].x-pts[i].x)*(pts[j].y+pts[i].y);
  }
  if(A >= 0){
    c.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<pts.length;i++) c.lineTo(pts[i].x, pts[i].y);
  } else {
    c.moveTo(pts[pts.length-1].x, pts[pts.length-1].y);
    for(let i=pts.length-2;i>=0;i--) c.lineTo(pts[i].x, pts[i].y);
  }
  c.closePath();
}

/* ── Rendu : rues/trottoirs jaunes, ombres bleu-gris, bâtiments intacts ── */
function render(){
  if(!state.dateStr) return;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  const c = map.getCenter();
  const sun = sunPosition(localDate(state.dateStr, state.minutes), c.lat, c.lng);
  updateSunInfo(sun);
  const alt = sun.altitude;

  if(alt <= 0.6*rad){
    /* nuit : voile bleu nuit sur toute la ville */
    ctx.fillStyle = "rgba(58, 68, 108, 0.55)";
    ctx.fillRect(0,0,W,H);
    return;
  }
  /* sans bâtiments chargés : pas de masque (carte normale) */
  if(!state.buildings.length || visibleWidthMeters() > MAX_WIDTH_M) return;

  const mPerLat = 110574, mPerLon = 111320*Math.cos(c.lat*rad);
  const len = 1/Math.tan(alt);
  const sx = Math.sin(sun.azimuth), sy = Math.cos(sun.azimuth);
  const pad = 80;

  /* 1 — lumière jaune sur tout le sol (dorée si soleil bas) */
  const golden = Math.max(0, Math.min(1, 1 - (alt*deg)/14));
  ctx.fillStyle = `rgb(255, ${Math.round(228 - golden*46)}, ${Math.round(135 - golden*45)})`;
  ctx.fillRect(0,0,W,H);

  /* 1a — parcs et espaces verts : vert doux (sous l'eau et les ombres) */
  if(state.parks && state.parks.length){
    ctx.fillStyle = "#A8CC7F";
    ctx.beginPath();
    for(const poly of state.parks){
      const s0 = map.latLngToContainerPoint(poly[0]);
      ctx.moveTo(s0.x, s0.y);
      for(let i=1;i<poly.length;i++){
        const p = map.latLngToContainerPoint(poly[i]);
        ctx.lineTo(p.x, p.y);
      }
      ctx.closePath();
    }
    ctx.fill();
  }

  /* 1b — points d'eau : bassins, rivières, canaux en bleu franc */
  if((state.water && state.water.length) || (state.waterLines && state.waterLines.length)){
    const pA = map.latLngToContainerPoint([c.lat, c.lng]);
    const pB = map.latLngToContainerPoint([c.lat, c.lng + 100/(111320*Math.cos(c.lat*rad))]);
    const pxPerM = Math.abs(pB.x - pA.x) / 100;
    ctx.fillStyle = "#5FB6DD";
    ctx.beginPath();
    for(const poly of (state.water||[])){
      const s0 = map.latLngToContainerPoint(poly[0]);
      ctx.moveTo(s0.x, s0.y);
      for(let i=1;i<poly.length;i++){
        const p = map.latLngToContainerPoint(poly[i]);
        ctx.lineTo(p.x, p.y);
      }
      ctx.closePath();
    }
    ctx.fill();
    ctx.strokeStyle = "#5FB6DD";
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.lineWidth = Math.max(4*pxPerM, 2);
    ctx.beginPath();
    for(const line of (state.waterLines||[])){
      const s0 = map.latLngToContainerPoint(line[0]);
      ctx.moveTo(s0.x, s0.y);
      for(let i=1;i<line.length;i++){
        const p = map.latLngToContainerPoint(line[i]);
        ctx.lineTo(p.x, p.y);
      }
    }
    ctx.stroke();
  }

  /* 1c — lumière directionnelle : plus chaud du côté d'où vient le soleil */
  {
    const dirX = -sx, dirY = sy; // vecteur écran pointant VERS le soleil
    const R = Math.hypot(W,H)/2;
    const g = ctx.createLinearGradient(W/2 + dirX*R, H/2 + dirY*R,
                                       W/2 - dirX*R, H/2 - dirY*R);
    g.addColorStop(0, "rgba(255,170,60,0.16)");
    g.addColorStop(0.55, "rgba(255,170,60,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
  }

  /* 2 — ombres portées : volume balayé par les murs, enroulement normalisé
        (sans cela, les faces avant/arrière s'annulent et il ne reste
         qu'une silhouette décalée — bug corrigé en v4) */
  ctx.fillStyle = "#6E77A0";
  ctx.beginPath();
  for(const bld of state.buildings){
    const L2 = Math.min(bld.h*len, 800);
    const dLat = (sy*L2)/mPerLat, dLon = (sx*L2)/mPerLon;
    const P = bld.latlngs, n = P.length;
    let footVisible = false, shadowVisible = false;
    const pts = new Array(n), pts2 = new Array(n);
    for(let i=0;i<n;i++){
      const p = map.latLngToContainerPoint(P[i]);
      pts[i] = p;
      if(p.x>-pad && p.x<W+pad && p.y>-pad && p.y<H+pad) footVisible = true;
      const p2 = map.latLngToContainerPoint([P[i][0]+dLat, P[i][1]+dLon]);
      pts2[i] = p2;
      if(p2.x>-pad && p2.x<W+pad && p2.y>-pad && p2.y<H+pad) shadowVisible = true;
    }
    bld._pts = footVisible ? pts : null; // murs/toits : seulement si l'empreinte est visible
    if(!footVisible && !shadowVisible) continue; // ni le bâtiment ni son ombre ne touchent l'écran
    for(let i=0;i<n;i++){
      const j = (i+1)%n;
      addQuad(ctx, pts[i], pts[j], pts2[j], pts2[i]);
    }
    addPoly(ctx, pts);   // l'empreinte comble le cœur du volume balayé
    addPoly(ctx, pts2);  // et son image projetée
  }
  ctx.fill();

  /* 3 — murs visibles côté ombre : effet de hauteur (2,5D) */
  ctx.fillStyle = "#8B87A0";
  ctx.beginPath();
  for(const bld of state.buildings){
    const pts = bld._pts;
    if(!pts) continue;
    const wl = Math.min(2.2 + bld.h*0.10, 5.5); // longueur du mur à l'écran (m)
    const dLat = (sy*wl)/mPerLat, dLon = (sx*wl)/mPerLon;
    const P = bld.latlngs, n = P.length;
    const q = new Array(n);
    for(let i=0;i<n;i++) q[i] = map.latLngToContainerPoint([P[i][0]+dLat, P[i][1]+dLon]);
    for(let i=0;i<n;i++){
      const j = (i+1)%n;
      addQuad(ctx, pts[i], pts[j], q[j], q[i]);
    }
  }
  ctx.fill();

  /* 4 — toits : trois nuances stables pour casser l'aplat */
  const ROOF_SHADES = ["#F6F3EC", "#ECE6D8", "#E2DAC8"];
  const roofShade = bld => {
    const p = bld.latlngs[0];
    return ROOF_SHADES[Math.abs(Math.round(p[0]*1e5) + Math.round(p[1]*1e5)) % 3];
  };
  for(const shade of ROOF_SHADES){
    ctx.fillStyle = shade;
    ctx.beginPath();
    for(const bld of state.buildings){
      const pts = bld._pts;
      if(!pts || roofShade(bld) !== shade) continue;
      ctx.moveTo(pts[0].x, pts[0].y);
      for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.closePath();
    }
    ctx.fill();
  }
  ctx.beginPath();
  for(const bld of state.buildings){
    const pts = bld._pts;
    if(!pts) continue;
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
  }
  ctx.strokeStyle = "#CCC3B0";
  ctx.lineWidth = 1;
  ctx.stroke();

}

/* ── Infos soleil ── */
function fmtTime(min){
  const h=Math.floor(min/60), m=Math.round(min%60);
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
}
function updateSunInfo(sun){
  const el = document.getElementById("suninfo");
  const alt = sun.altitude*deg;
  if(alt <= 0.6){ el.innerHTML = "🌙 <b>Soleil couché</b>"; return; }
  const azN = (sun.azimuth*deg + 180 + 360)%360;
  const dir = ["N","NE","E","SE","S","SO","O","NO"][Math.round(azN/45)%8];
  el.innerHTML = `☀️ Hauteur <b>${alt.toFixed(0)}°</b><br>Azimut <b>${azN.toFixed(0)}° ${dir}</b>`;
}
function setBanner(txt, warn){
  const b = document.getElementById("banner");
  if(!warn && !txt){ b.style.display = "none"; return; }
  b.style.display = "block";
  b.textContent = txt;
  b.className = warn ? "warn" : "";
  b.style.pointerEvents = "none";
}
window.retryLoad = function(){
  state.loadedBounds = null;
  state.loading = false;
  loadBuildings();
};

const locateBtn = document.getElementById("locateBtn");
locateBtn.addEventListener("click", ()=>{
  if(!navigator.geolocation){
    setBanner("⚠️ La géolocalisation n'est pas disponible sur cet appareil/navigateur.", true);
    return;
  }
  locateBtn.classList.add("busy");
  navigator.geolocation.getCurrentPosition(
    pos=>{
      locateBtn.classList.remove("busy");
      const {latitude, longitude} = pos.coords;
      map.setView([latitude, longitude], 18.5);
      placeMarker(latitude, longitude, "Ma position");
    },
    err=>{
      locateBtn.classList.remove("busy");
      const msg = err.code===1 ? "Autorisez la localisation dans les réglages du navigateur pour utiliser ce bouton."
                                : "Position indisponible pour le moment. Réessayez.";
      setBanner("⚠️ "+msg, true);
    },
    {enableHighAccuracy:true, timeout:12000}
  );
});
const placesBtn = document.getElementById("placesBtn");
placesBtn.addEventListener("click", ()=>{
  state.placesVisible = !state.placesVisible;
  placesBtn.classList.toggle("active", state.placesVisible);
  placesBtn.title = state.placesVisible ? "Masquer les bars/restaurants" : "Afficher les bars/restaurants";
  if(!state.placesLayer) return;
  if(state.placesVisible) state.placesLayer.addTo(map);
  else map.removeLayer(state.placesLayer);
});
function closeSearch(){
  searchBox.style.display = "none";
  searchBtn.style.display = "block";
  searchResults.innerHTML = "";
}
searchInput.addEventListener("keydown", e=>{
  if(e.key==="Enter"){ e.preventDefault(); doSearch(); }
});
function placeMarker(lat, lon, name){
  if(state.marker) map.removeLayer(state.marker);
  const icon = L.divIcon({
    className:"",
    html:'<div class="sun-pin-wrap"><div class="sun-pin-ring"></div><div class="sun-pin"></div></div>',
    iconSize:[30,30], iconAnchor:[15,30], popupAnchor:[0,-30]
  });
  state.marker = L.marker([lat, lon], {icon, zIndexOffset:1000}).addTo(map)
    .on("click", ()=>openCard(lat, lon, name, false));
  openCard(lat, lon, name, false);
}
async function doSearch(){
  const q = searchInput.value.trim();
  if(q.length<3) return;
  searchResults.innerHTML = '<div class="res">Recherche…</div>';
  try{
    const r = await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&limit=6&accept-language=fr&q="+encodeURIComponent(q));
    if(!r.ok) throw new Error("HTTP "+r.status);
    const list = await r.json();
    if(!list.length){
      searchResults.innerHTML = '<div class="res">Aucun résultat. Essayez « nom + ville ».</div>';
      return;
    }
    searchResults.innerHTML = "";
    for(const it of list){
      const d = document.createElement("div");
      d.className = "res";
      const parts = it.display_name.split(",");
      d.innerHTML = `<b>${parts[0]}</b><small>${parts.slice(1,4).join(",")}</small>`;
      d.onclick = ()=>{
        closeSearch();
        const la = parseFloat(it.lat), lo = parseFloat(it.lon);
        /* zoom 18.5 ≈ environ 50 m de rayon sur mobile */
        map.setView([la, lo], 18.5);
        placeMarker(la, lo, parts[0]);
      };
      searchResults.appendChild(d);
    }
  }catch(e){
    searchResults.innerHTML = '<div class="res">⚠️ Recherche indisponible ici (réseau bloqué dans l\'aperçu). Ouvrez le fichier téléchargé dans votre navigateur.</div>';
  }
}

/* ── Curseur temps + date + animation ── */
const slider = document.getElementById("timeSlider");
const timeBubble = document.getElementById("timeBubble");
function updateBubble(){
  const min=+slider.min, max=+slider.max, v=+slider.value;
  const pct=(v-min)/(max-min);
  const w=slider.clientWidth || slider.getBoundingClientRect().width;
  timeBubble.style.left = (pct*(w-30)+15)+"px";
  timeBubble.textContent = fmtTime(v);
}
window.addEventListener("resize", updateBubble);
const dateInput = document.getElementById("dateInput");
const playBtn = document.getElementById("playBtn");

slider.addEventListener("input", ()=>{
  state.minutes = +slider.value;
  updateBubble();
  render();
});
dateInput.addEventListener("change", ()=>{
  if(dateInput.value){ state.dateStr = dateInput.value; render(); }
});
playBtn.addEventListener("click", ()=>{
  state.playing = !state.playing;
  playBtn.textContent = state.playing ? "❚❚" : "▶";
  if(state.playing) requestAnimationFrame(tick);
});
let lastT = 0;
function tick(t){
  if(!state.playing) return;
  if(t-lastT > 60){
    lastT = t;
    state.minutes += 6;
    if(state.minutes > 1380) state.minutes = 300;
    slider.value = state.minutes;
    updateBubble();
    render();
  }
  requestAnimationFrame(tick);
}

/* ── Initialisation ── */
(function init(){
  const now = new Date();
  const p = new Intl.DateTimeFormat("fr-FR",{timeZone:"Europe/Paris",
    year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false})
    .formatToParts(now).reduce((o,x)=>(o[x.type]=x.value,o),{});
  state.dateStr = `${p.year}-${p.month}-${p.day}`;
  dateInput.value = state.dateStr;
  state.minutes = Math.min(1380, Math.max(300, Math.round(((+p.hour)*60+(+p.minute))/5)*5));
  /* si le soleil est couché à l'heure actuelle, placer le curseur à 14:00 */
  const sunNow = sunPosition(localDate(state.dateStr, state.minutes), 48.8906, 2.3199);
  if(sunNow.altitude <= 0.6*rad){
    state.minutes = 840;
    setTimeout(()=>setBanner("🌙 Il fait nuit en ce moment — curseur placé à 14:00 pour la démonstration. Glissez-le pour explorer la journée.", false), 400);
  }
  slider.value = state.minutes;
  state.ratings = loadRatings();
  resizeCanvas();
  updateBubble();
  loadBuildings();
})();

/* Enregistrement du service worker : active le mode installable + hors-ligne partiel */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("service-worker.js").catch(()=>{});
  });
}
